    window.addEventListener('load', () => {

            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; document.body.classList.remove('loading'); document.body.style.overflow = 'auto'; }, 800);

    async function handleFiles(files) {
        const status = document.getElementById('upload-status');
        const imgInput = document.getElementById('p-img');
        const saveBtn = document.getElementById('save-btn');
        const filesToProcess = Array.from(files).slice(0, 4);
        status.innerText = "Сжимаем...";
        saveBtn.disabled = true;
        currentImgsArray = [];
        for (let file of filesToProcess) {
            const bitmap = await createImageBitmap(file);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const maxWidth = 800;
            const scale = maxWidth / bitmap.width;
            canvas.width = maxWidth; canvas.height = bitmap.height * scale;
            ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
            currentImgsArray.push(canvas.toDataURL('image/jpeg', 0.7));
        }
        imgInput.value = currentImgsArray.join('|');
        status.innerText = "Готово!";
        saveBtn.disabled = false;
    }
